# Description:
#   - Release Nu Pkgs
# REF:
#   - https://github.com/marketplace/actions/checkout
#   - https://gemfury.com/guide/alpine/configure-apk/

name: Test Install Nu Pkgs for RISC-V
on:
  workflow_dispatch:
  schedule:
    - cron: '15 0 * * *' # run at 00:15 AM UTC
  push:
    branches:
      - feature/riscv64

    paths-ignore:
      - '**.md'

jobs:
  install-rpm-loong:
    name: Install Nu RPM on Loong64
    strategy:
      fail-fast: false
      matrix:
        image:
          - loongarch64/openeuler:24.03-LTS
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Test Install Nushell on Loong64
        run: |
          docker pull --platform=linux/loong64 ${{ matrix.image }}

          # Create a script to run inside the container
          cat > install_nu.sh << 'EOF'
          # Check GLIBC version
          echo "GLIBC version:"
          ldd --version
          # Create repo config file pointing to Gemfury
          echo "[gemfury-nushell]
          name=Gemfury Nushell Repo
          baseurl=https://yum.fury.io/nushell/
          enabled=1
          gpgcheck=0
          gpgkey=https://yum.fury.io/nushell/gpg.key" | tee /etc/yum.repos.d/fury-nushell.repo
          # Install Nushell via dnf force architecture to loongarch64
          # 更新仅从 Gemfury 仓库而不是系统仓库
          dnf clean all
          dnf --disablerepo="*" --enablerepo="gemfury-nushell" makecache

          # 安装 Nushell（仅从 Gemfury 仓库）
          dnf --disablerepo="*" --enablerepo="gemfury-nushell" install -y nushell --nogpgcheck
          cat /etc/shells
          # Print nushell version to verify installation
          nu -c '$nu.current-exe | print; ls $nu.default-config-dir | print; version'
          EOF

          chmod +x install_nu.sh

          # Run the container with QEMU emulation
          docker run --platform=linux/loong64 --rm -v $(pwd)/install_nu.sh:/install_nu.sh ${{ matrix.image }} /bin/bash /install_nu.sh

  install-deb-loong:
    # if: false
    name: Install Nu deb on Loong64
    strategy:
      fail-fast: false
      matrix:
        image:
          - loongarch64/debian:latest
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Test Install Nushell on Loong64
        run: |
          docker pull --platform=linux/loong64 ${{ matrix.image }}

          # Create a script to run inside the container
          cat > install_nu.sh << 'EOF'
          # Check GLIBC version
          echo "GLIBC version:"
          ldd --version
          # Disable SSL certificate checking for apt (not recommended for production!)
          echo 'Acquire::https::Verify-Peer "false";' | tee /etc/apt/apt.conf.d/99insecure
          echo 'Acquire::https::Verify-Host "false";' | tee -a /etc/apt/apt.conf.d/99insecure
          # curl & gpg are not available in debian images, so we install without verifying the gpg key
          # Add the repository with trusted=yes so that apt does not verify package signatures
          echo "deb [trusted=yes] https://apt.fury.io/nushell/ /" | tee /etc/apt/sources.list.d/fury.list
          apt update
          # apt install -y nushell:loongarch64
          # Use --force-architecture to override the architecture check
          apt-get download nushell:loongarch64
          dpkg --force-architecture -i ./nushell*.deb || true
          apt-get -f install -y
          cat /etc/shells
          nu -c '$nu.current-exe | print; ls $nu.default-config-dir | print; version'
          EOF

          chmod +x install_nu.sh

          # Run the container with QEMU emulation
          docker run --platform=linux/loong64 --rm -v $(pwd)/install_nu.sh:/install_nu.sh ${{ matrix.image }} /bin/bash /install_nu.sh

  install-deb-riscv:
    name: Install Nu deb on RISC-V
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:trixie
          - ubuntu:24.04
          - ubuntu:22.04
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Test Install Nushell on RISC-V
        run: |
          docker pull --platform=linux/riscv64 ${{ matrix.image }}

          # Create a script to run inside the container
          cat > install_nu.sh << 'EOF'
          # Disable SSL certificate checking for apt (not recommended for production!)
          echo 'Acquire::https::Verify-Peer "false";' | tee /etc/apt/apt.conf.d/99insecure
          echo 'Acquire::https::Verify-Host "false";' | tee -a /etc/apt/apt.conf.d/99insecure
          # curl & gpg are not available in debian images, so we install without verifying the gpg key
          # Add the repository with trusted=yes so that apt does not verify package signatures
          echo "deb [trusted=yes] https://apt.fury.io/nushell/ /" | tee /etc/apt/sources.list.d/fury.list
          apt update
          apt install nushell
          cat /etc/shells
          nu -c '$nu.current-exe | print; ls $nu.default-config-dir | print; version'
          EOF

          chmod +x install_nu.sh

          # Run the container with QEMU emulation
          docker run --platform=linux/riscv64 --rm -v $(pwd)/install_nu.sh:/install_nu.sh ${{ matrix.image }} /bin/bash /install_nu.sh

